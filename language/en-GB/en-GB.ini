ERR_INVALID_ARCHIVE_LONG="The archive file appears to be corrupt, or archive parts are missing. If your backup consists of multiple files, please make sure you have all the archive part files (files with the same name and extensions .%s, .%s01, .%2$s02…) in the same folder, and that each file's size matches the original."
COULDNT_CREATE_DIR="Could not create %s folder."
COULDNT_WRITE_FILE="Could not open %s for writing."
ERR_NOT_A_JPS_FILE="The file is not a JPS archive."
ERR_INVALID_JPS_PASSWORD="The password you gave is wrong or the archive is corrupt."
INVALID_FILE_HEADER_OFFSET_ZERO="Cannot open the file %s for reading. This is part #%d of your backup archive, which consists of multiple files (files with the same name and extensions .%s, .%s01, .%4$s02…). Please make sure all of these files are present in the same folder."
INVALID_FILE_HEADER="Invalid header in archive file, part %s, offset %s. Please make sure the archive files are complete and were transferred without corruption; check that each file's size matches the original."
INVALID_FILE_HEADER_MULTIPART="Invalid header in archive file, part %s, offset %s. Your backup archive consists of multiple files (files with the same name and extensions .%s, .%s01, .%4$s02…). Either some files are missing, or they are corrupt or truncated. You need all of these files present in the same folder."
ERR_COULD_NOT_OPEN_ARCHIVE_PART="Could not open archive part file %s for reading. Check that the file exists and is readable."
SKIPPED_UNWRITABLE_FILE="Skipped (could not write): %s"

