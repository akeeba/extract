INVALID_FILE_HEADER_MULTIPART="Cabeçalho inválido no ficheiro do arquivo, parte %s, deslocamento %s. A sua cópia de segurança é composta por vários ficheiros (ficheiros com o mesmo nome e as extensões .%s, .%s01, .%4$s02…). Ou faltam alguns ficheiros, ou estão danificados ou truncados. Precisa de todos estes ficheiros na mesma pasta."
