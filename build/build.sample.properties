# Akeeba Extract — private build configuration (secrets)
#
# Copy this file to build/build.properties and fill in the values below.
# build/build.properties is gitignored and never committed; a missing file is
# tolerated by build.xml (Phing skips loading it), so targets that don't need
# these properties (git, package, run, ...) keep working without it. Only the
# `release` target requires it.

# ---------------------------------------------------------------------------
# WHAT YOU NEED TO PROVIDE (quick reference — details in each section below)
# ---------------------------------------------------------------------------
# Every property is OPTIONAL: leave a group blank and that capability is simply
# skipped (builds still succeed, just unsigned / unpublished). Fill in only the
# group(s) you need:
#
#   Publish a release (`phing release`) ....... github.token
#                                               cdn.ftp.hostname / .username
#                                               cdn.ftp.password / .directory
#
#   Sign + notarize macOS (.app/.dmg) ......... macos.sign.identity
#                                               macos.notary.profile
#
#   Sign Windows (.exe + installer) ........... windows.sign.op-item
#                                               (the other windows.sign.* keys
#                                                already default correctly — only
#                                                change them if your setup differs)
#
# The macOS/Windows signing credentials are the SAME org-wide values used by our
# other Boson apps (e.g. Grafida); reuse them rather than creating new ones.
# ---------------------------------------------------------------------------

# GitHub — used by the `githubrelease`/`updatejson` Phing tasks (the `release` target)
# to publish a GitHub Release and read it back for the update JSON.
github.organization = akeeba
github.repository   = extract
github.token         =

# CDN — where akeeba-extract.json (the update-check JSON) is uploaded over FTPS
# by the `ftpsupload` Phing task.
cdn.ftp.hostname  =
cdn.ftp.username  =
cdn.ftp.password  =
cdn.ftp.directory =

# macOS code signing & notarization — see build/readme/01-macos-signing.md
#
# Leave both blank for local dev builds (the app is ad-hoc signed and runs
# locally, but cannot be notarized/distributed). Fill them in to sign +
# notarize the distributable .app/.dmg during `phing package` / release.
#
# The "Developer ID Application" signing identity, exactly as shown by
#   security find-identity -v -p codesigning
# e.g. Developer ID Application: Your Name (ABCDE12345)
macos.sign.identity =
# The notarytool keychain profile name created with
#   xcrun notarytool store-credentials "akeeba-extract-notary" --apple-id … --team-id … --password …
# When set (and macos.sign.identity is set), the DMG is submitted to Apple and
# the notarization ticket is stapled.
macos.notary.profile =

# Windows code signing (Azure Artifact Signing + Jsign) — see
# build/readme/04-exe-signing-on-macos.md
#
# Leave windows.sign.op-item blank for local dev builds — akeeba-extract.exe
# and the installer are shipped unsigned. Fill it in to sign both during
# `phing package-win-x86` / `phing package` / release. Signing NEVER runs for
# `phing git-win-x86` (the plain compile) — only from packaging — because
# Azure's Basic tier is capped at 5,000 signatures/month and this must not be
# burned by local development builds.
#
# The name of the 1Password item holding the Azure service principal created
# in build/readme/04-exe-signing-on-macos.md (appId/password/tenant). Blank
# disables signing.
windows.sign.op-item =
# The field names inside that 1Password item (only change these if your item
# uses different field names than the defaults below).
windows.sign.op-field-appid    = appId
windows.sign.op-field-password = password
windows.sign.op-field-tenant   = tenant
# Jsign --keystore / --alias — the Azure Artifact Signing account + certificate
# profile created in build/readme/04-exe-signing-on-macos.md.
windows.sign.keystore = weu.codesigning.azure.net
windows.sign.alias    = akeeba-signing/AkeebaPublic
# RFC3161 timestamp authority — do not remove; without it the signature expires
# with the 3-day Azure Artifact Signing certificate.
windows.sign.tsaurl = http://timestamp.acs.microsoft.com
