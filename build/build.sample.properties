# Akeeba Extract — private build configuration (secrets)
#
# Copy this file to build/build.properties and fill in the values below.
# build/build.properties is gitignored and never committed; a missing file is
# tolerated by build.xml (Phing skips loading it), so targets that don't need
# these properties (git, package, run, ...) keep working without it. Only the
# `release` target requires it.

# GitHub — used by the `githubrelease`/`updatejson` Phing tasks (the `release` target)
# to publish a GitHub Release and read it back for the update JSON.
github.organization = akeeba
github.repository   = extract
github.token         =

# CDN — where akeeba-extract.json (the update-check JSON) is uploaded over FTPS
# by the `ftpsupload` Phing task.
cdn.ftp.hostname  =
cdn.ftp.username  =
cdn.ftp.password  =
cdn.ftp.directory =
